name: Refresh Data (Worker Schedule)

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r worker/requirements.txt

      - name: Run worker
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-4o-mini' }}
          LOG_LEVEL: INFO
          DRY_RUN: "false"
        working-directory: worker
        run: python main.py

      - name: Validate generated JSON
        run: |
          pip install pytest --quiet
          python -m pytest tests/test_schema.py -v

      - name: Commit and push updated data
        run: |
          git config user.name "devops-news-bot"
          git config user.email "bot@github-actions"
          git add docs/data/news.json docs/data/jobs.json docs/data/meta.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: refresh news/jobs data [skip ci]"
            git push
          fi